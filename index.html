<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Naga Raju & Sai Nirosha</title>
    <style>
        /* Elegant Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            background: linear-gradient(-45deg, #fff5f5, #fef3e2, #fdf5e6, #fffafa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Card Design */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px 0 30px 0; /* Stylized corners */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 85%;
            border: 2px solid #d4af37;
            position: relative;
        }

        /* Decorative Floral Elements */
        .card::before {
            content: "❦";
            font-size: 30px;
            color: #d4af37;
            display: block;
            margin-bottom: 10px;
        }

        h1 { color: #8b0000; font-size: 1.8rem; margin: 10px 0; }
        
        .couple-names {
            font-size: 2.2rem;
            color: #8b0000;
            font-family: 'Times New Roman', serif;
            margin: 15px 0;
            font-weight: bold;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            border: none;
        }

        .btn-open {
            background: #d4af37;
            color: white;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-maps {
            background: #ffffff;
            color: #d4af37;
            border: 1px solid #d4af37;
            font-size: 14px;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Reveal Section */
        #secret-details {
            display: none;
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .venue-info {
            background: #fff9f0;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            color: #444;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="cover">
            <h1>You're Invited!</h1>
            <p>To the wedding celebration of</p>
            <h2 style="color:#d4af37">Naga Raju & Sai Nirosha</h2>
            <button class="btn btn-open" onclick="openInvite()">Open Invitation</button>
        </div>

        <div id="secret-details">
            <div class="couple-names">Naga Raju <br>&<br> Sai Nirosha</div>
            <p><strong>April 29, 2026</strong></p>
            
            <div class="venue-info">
                <strong>Venue:</strong><br>
                Our Residence, Chapra Village<br>
                PIN: 532226
            </div>

            <a href="https://www.google.com/maps/search/?api=1&query=Chapra+Village+532226" 
               target="_blank" class="btn btn-maps">
               📍 View on Google Maps
            </a>

            <p style="margin-top:20px; font-size: 14px; color: #8b0000;">
                We look forward to seeing you there!
            </p>
        </div>
    </div>

    <script>
        function openInvite() {
            document.getElementById('cover').style.display = 'none';
            document.getElementById('secret-details').style.display = 'block';
        }
    </script>

</body>
</html>
