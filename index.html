<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    text-align: center;
    background: linear-gradient(to right, #fff8f0, #fdebd0);
    transition: background 1s ease;
}

/* Background after click */
.bg-image {
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center/cover;
}

/* Container */
.container {
    margin-top: 80px;
    perspective: 1200px;
}

/* Button */
button {
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(to right, #800020, #b03a2e);
    color: #fff;
    cursor: pointer;
}

/* Card */
.card {
    width: 320px;
    height: 420px;
    margin: 40px auto;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s;
}

.open {
    transform: rotateY(180deg);
}

/* Glassmorphism */
.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
}

/* Front */
.front {
    font-size: 22px;
    font-weight: bold;
}

/* Back */
.back {
    transform: rotateY(180deg);
    padding: 20px;
}

.back h2 {
    color: gold;
    margin-bottom: 10px;
}

/* Petals */
.petal {
    position: fixed;
    top: -10px;
    width: 12px;
    height: 12px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Wedding Invitation</h1>
    <p>Tap below to open</p>

    <button onclick="openCard()">Open Invitation</button>

    <div class="card" id="card">
        <div class="card-face front">
            💌 Tap to Open
        </div>

        <div class="card-face back">
            <h2>Naga Raju ❤️ Sai Nirosha</h2>
            <p><strong>Date:</strong> 29 April 2026</p>
            <p><strong>Venue:</strong><br>Residence, Chapara Village, Bendi Street</p>
            <p>Your presence will be a cherished blessing as we begin this new journey together.</p>
        </div>
    </div>
</div>

<script>
function openCard() {
    document.getElementById("card").classList.add("open");
    document.body.classList.add("bg-image");
    createPetals();
}

/* Falling petals */
function createPetals() {
    for (let i = 0; i < 25; i++) {
        let petal = document.createElement("div");
        petal.classList.add("petal");

        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(petal);
    }
}
</script>

</body>
</html>
