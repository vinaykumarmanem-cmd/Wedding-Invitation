<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
    body {
        margin: 0;
        font-family: 'Georgia', serif;
        background: linear-gradient(to right, #fff5e6, #ffe0b2);
        text-align: center;
        color: #5a0f1c;
    }

    .bg-image {
        background: url('https://images.unsplash.com/photo-1519741497674-611481863552') no-repeat center center/cover;
    }

    .container {
        margin-top: 100px;
    }

    h1 {
        font-size: 44px;
        color: #8b0000;
        letter-spacing: 2px;
    }

    h2 {
        color: #b8860b;
        font-size: 28px;
    }

    p {
        font-size: 18px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(to right, #8b0000, #b22222);
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
        background: linear-gradient(to right, #b22222, #8b0000);
        transform: scale(1.05);
    }

    .details {
        margin-top: 30px;
        opacity: 0;
        transform: translateY(20px);
        transition: all 1s ease;
        pointer-events: none;
        background: rgba(139, 0, 0, 0.85);
        color: #fff8dc;
        padding: 25px;
        border-radius: 20px;
        display: inline-block;
        border: 3px solid gold;
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .show {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Wedding Invitation 💍</h1>
    <p>We request your presence on this auspicious occasion</p>

    <button id="inviteBtn" onclick="showDetails()">View Invitation</button>

    <div class="details" id="details">
        <h2>NAGA RAJU ❤️ SAI NIROSHA</h2>
        <p><strong>Date:</strong> 29th April 2026</p>
        <p><strong>Venue:</strong> At Our Home, Vill:Chapara,Bendi Street</p>
        <p>With the blessings of elders, we invite you to join us in celebrating our wedding💍.</p>
    </div>
</div>

<script>
function showDetails() {
    document.getElementById("details").classList.add("show");
    document.body.classList.add("bg-image");
    document.getElementById("inviteBtn").style.display = "none";
}
</script>

</body>
</html>
