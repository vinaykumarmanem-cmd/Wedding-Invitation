<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    text-align: center;
    background: linear-gradient(to right, #fff8f0, #fdebd0);
    transition: background 1s ease;
}

/* Background after click */
.bg-image {
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center/cover;
}

/* Container */
.container {
    margin-top: 80px;
    perspective: 1200px;
}

/* Button */
button {
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(to right, #800020, #b03a2e);
    color: #fff;
    cursor: pointer;
}

/* Card */
.card {
    width: 320px;
    height: 440px;
    margin: 40px auto;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s;
}

.open {
    transform: rotateY(180deg);
}

/* Glassmorphism */
.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
}

/* Front */
.front {
    font-size: 22px;
    font-weight: bold;
}

/* Back */
.back {
    transform: rotateY(180deg);
    padding: 20px;
}

/* Photos */
.photos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
}

.person {
    text-align: center;
}

.person img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid gold;
    object-fit: cover;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.person p {
    margin-top: 5px;
    font-size: 14px;
}

/* Heart */
.heart {
    font-size: 22px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* Text */
.back h2 {
    color: gold;
    margin-bottom: 10px;
}

.msg {
    margin-top: 10px;
    font-size: 14px;
    font-style: italic;
}

/* Petals */
.petal {
    position: fixed;
    top: -10px;
    width: 12px;
    height: 12px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Wedding Invitation</h1>
    <p>Tap below to open</p>

    <button onclick="openCard()">Open Invitation</button>

    <div class="card" id="card">

        <!-- FRONT -->
        <div class="card-face front">
            💌 Tap to Open
        </div>

        <!-- BACK WITH PHOTOS -->
        <div class="card-face back">

            <div class="photos">
                <div class="person">
                    <img src="BRIDE_PHOTO_URL" alt="Bride">
                    <p>Sai Nirosha</p>
                </div>

                <div class="heart">❤️</div>

                <div class="person">
                    <img src="GROOM_PHOTO_URL" alt="Groom">
                    <p>Naga Raju</p>
                </div>
            </div>

            <h2>Wedding Invitation</h2>

            <p><strong>Date:</strong> 29 April 2026</p>
            <p><strong>Venue:</strong><br>At Our Residence, Chapara Village, Bendi Street</p>

            <p class="msg">
                Your presence will be a cherished blessing as we begin this new journey together✨
            </p>

        </div>

    </div>
</div>

<script>
function openCard() {
    document.getElementById("card").classList.add("open");
    document.body.classList.add("bg-image");
    createPetals();
}

function createPetals() {
    for (let i = 0; i < 25; i++) {
        let petal = document.createElement("div");
        petal.classList.add("petal");

        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(petal);
    }
}
</script>

</body>
</html>
