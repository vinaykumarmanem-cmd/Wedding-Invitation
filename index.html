<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
}

/* Button */
button {
    padding: 14px 25px;
    font-size: 18px;
    border: none;
    background: #e91e63;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* Envelope */
.envelope {
    position: relative;
    width: 320px;
    height: 200px;
    margin-top: 20px;
}

/* Body */
.envelope .body {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f48fb1;
    border-radius: 10px;
}

/* Flap */
.envelope .flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ec407a;
    clip-path: polygon(0 0, 50% 60%, 100% 0);
    transform-origin: top;
    transition: transform 1s ease;
    border-radius: 10px;
}

/* Card inside */
.card {
    position: absolute;
    width: 90%;
    height: 160px;
    background: white;
    left: 5%;
    top: 20px;
    border-radius: 15px;
    text-align: center;
    padding: 15px;
    transform: translateY(40px);
    opacity: 0;
    transition: all 1s ease;
}

/* Open state */
.envelope.open .flap {
    transform: rotateX(180deg);
}

.envelope.open .card {
    transform: translateY(-60px);
    opacity: 1;
}

/* Text */
.names {
    font-size: 22px;
    color: #e91e63;
    font-weight: bold;
}

.date {
    margin-top: 10px;
    color: #444;
}

.message {
    margin-top: 10px;
    font-size: 14px;
    color: #666;
}

/* Mobile */
@media (max-width: 400px) {
    .envelope {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="container">
    <button onclick="openEnvelope()">Open Invitation 💌</button>

    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="body"></div>

        <div class="card">
            <div class="names">Naga Raju ❤️ Sai Nirosha</div>
            <div class="date">📅 29th April 2026</div>
            <div class="message">
                Together with their families, invite you to celebrate their wedding 💍
            </div>
        </div>
    </div>
</div>

<script>
function openEnvelope() {
    document.getElementById("envelope").classList.add("open");
}
</script>

</body>
</html>
